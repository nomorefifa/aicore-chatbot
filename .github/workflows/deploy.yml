name: Deploy to Cloud Run

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: GCP 인증
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: gcloud 설정
        uses: google-github-actions/setup-gcloud@v2

      - name: Docker 빌드 및 Artifact Registry 푸시
        run: |
          gcloud auth configure-docker asia-northeast3-docker.pkg.dev --quiet
          docker build \
            -t asia-northeast3-docker.pkg.dev/${{ secrets.GCP_PROJECT }}/aicore-chatbot-image/app:${{ github.sha }} \
            -t asia-northeast3-docker.pkg.dev/${{ secrets.GCP_PROJECT }}/aicore-chatbot-image/app:latest \
            .
          docker push asia-northeast3-docker.pkg.dev/${{ secrets.GCP_PROJECT }}/aicore-chatbot-image/app:${{ github.sha }}
          docker push asia-northeast3-docker.pkg.dev/${{ secrets.GCP_PROJECT }}/aicore-chatbot-image/app:latest

      - name: Cloud Run 배포
        run: |
          gcloud run deploy instructor-agent \
            --image asia-northeast3-docker.pkg.dev/${{ secrets.GCP_PROJECT }}/aicore-chatbot-image/app:${{ github.sha }} \
            --region asia-northeast3 \
            --platform managed \
            --set-secrets GOOGLE_API_KEY=GOOGLE_API_KEY:latest \
            --set-env-vars "USE_WEAVIATE=true,WEAVIATE_HOST=10.0.1.2,WEAVIATE_PORT=8080,USE_NEO4J=true,NEO4J_URI=bolt://10.0.1.2:7687,NEO4J_USER=neo4j,NEO4J_PASSWORD=${{ secrets.NEO4J_PASSWORD }}" \
            --vpc-connector aicore-connector \
            --vpc-egress private-ranges-only \
            --memory 2Gi \
            --min-instances 0 \
            --max-instances 3 \
            --timeout 300 \
            --session-affinity \
            --allow-unauthenticated

      - name: 트래픽 최신 revision으로 전환
        run: |
          gcloud run services update-traffic instructor-agent \
            --to-latest \
            --region asia-northeast3
